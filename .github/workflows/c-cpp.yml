name: C/C++ CI

on:
  push:
    branches: [ ci ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: setup
      run: sudo apt-get install csh clang-format
    - name: setup test env
      run: cd tools; make bats.done cpplint.done sptk.done
    - name: make format
      run: make format
    - name: make test
      run: make test
